<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Start Your Story | Monarch Tales</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fbf7f2;
      color: #2b211c;
      margin: 0;
    }

    .container {
      width: min(92%, 800px);
      margin: 0 auto;
      padding: 40px 0;
    }

    h1, h2 {
      font-family: Georgia, serif;
    }

    h1 {
      font-size: 2.4rem;
      margin-bottom: 10px;
    }

    p {
      color: #6d5f57;
    }

    form {
      margin-top: 30px;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    label {
      display: block;
      margin-top: 20px;
      font-weight: bold;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 0.95rem;
    }

    textarea {
      min-height: 100px;
    }

    .section {
      margin-top: 40px;
    }

    .btn {
      margin-top: 30px;
      padding: 14px 20px;
      border: none;
      border-radius: 999px;
      background: #b6915f;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    .btn:hover {
      background: #8f6f45;
    }

    .note {
      font-size: 0.85rem;
      color: #6d5f57;
      margin-top: 6px;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>Let’s begin your child’s story</h1>
  <p>This takes less than 2 minutes. We’ll guide you step by step.</p>

  <form action="thank-you.html">

    <!-- STEP 1 -->
    <div class="section">
      <h2>Step 1 — Quick start</h2>

      <label>Your name</label>
      <input type="text" required>

      <label>Email address</label>
      <input type="email" required>

      <label>What is this story for?</label>
      <select required>
        <option value="">Select one</option>
        <option>Birthday</option>
        <option>Bedtime</option>
        <option>Gift</option>
        <option>Special moment</option>
      </select>
    </div>

    <!-- STEP 2 -->
    <div class="section">
      <h2>Step 2 — About your child</h2>

      <label>Child’s name</label>
      <input type="text" required>

      <label>Age</label>
      <input type="number" required>

      <label>What makes your child special?</label>
      <textarea placeholder="Personality, habits, things they love..."></textarea>

      <label>Favorite things</label>
      <textarea placeholder="Animals, colors, hobbies, characters..."></textarea>
    </div>

    <!-- STEP 3 -->
    <div class="section">
      <h2>Step 3 — Story direction</h2>

      <label>What message should the story carry?</label>
      <textarea placeholder="Confidence, love, courage, kindness..."></textarea>

      <label>Any specific details you'd like included?</label>
      <textarea placeholder="Family members, places, memories..."></textarea>

      <p class="note">You don’t need to fill everything. We’ll guide you after this.</p>
    </div>

    <button class="btn">Continue</button>

  </form>

</div>

</body>
</html>
