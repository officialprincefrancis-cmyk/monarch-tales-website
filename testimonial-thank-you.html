<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="favicon-512.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Testimonial Received | Monarch Tales</title>
  <meta name="robots" content="noindex, nofollow" />
<meta
  name="description"
  content="Thank you for sharing your Monarch Tales experience. Your testimonial has been received and helps other families discover personalized keepsake stories."
/>

  <style>
    :root {
      --bg: #fbf7f2;
      --card: #fffdf9;
      --text: #2b211c;
      --muted: #6d5f57;
      --gold: #b6915f;
      --gold-dark: #8f6f45;
      --gold-soft: #f3e8d9;
      --line: rgba(43, 33, 28, 0.08);
      --shadow: 0 12px 32px rgba(43, 33, 28, 0.08);
      --max: 820px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(243,232,217,0.45), transparent 28%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      line-height: 1.7;
    }

    .card {
      width: 100%;
      max-width: var(--max);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: 52px;
      text-align: center;
    }

    .logo-brand {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  margin-bottom: 26px;
  font-family: Georgia, "Times New Roman", serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--gold-dark);
}

.logo-brand img {
  height: 44px;
  width: auto;
  flex-shrink: 0;
}

.logo-brand {
  cursor: pointer;
}

@media (max-width: 720px) {
  .logo-brand {
    font-size: 1.2rem;
  }

  .logo-brand img {
    height: 38px;
  }
}

    .eyebrow {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--gold-soft);
      color: var(--gold-dark);
      font-size: 0.82rem;
      font-weight: 700;
    }

    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.4rem, 5vw, 4rem);
      line-height: 1.08;
      margin-bottom: 18px;
    }

    p {
      color: var(--muted);
      margin-bottom: 18px;
      font-size: 1rem;
    }

    .btn {
      display: inline-block;
      margin-top: 18px;
      padding: 15px 26px;
      border-radius: 999px;
      background: var(--gold);
      color: white;
      text-decoration: none;
      box-shadow: var(--shadow);
      transition: 0.25s ease;
    }

    .btn:hover {
      background: var(--gold-dark);
      transform: translateY(-2px);
    }

    @media (max-width: 720px) {
      .card {
        padding: 34px 24px;
      }
    }
  </style>
</head>

<body>

  <div class="card">

  <a href="index.html" class="logo-brand" aria-label="Monarch Tales Home">
    <img src="logo.webp" alt="Monarch Tales Logo" width="408" height="612">
    <span>Monarch Tales</span>
  </a>

  <span class="eyebrow">Testimonial Received</span>

    <h1>Thank you for sharing your family’s experience.</h1>

    <p>
      Your story will help other families discover the lasting value of a personalized keepsake created just for their child.
    </p>

    <p>
      We’re grateful to have created something meaningful for your child and family.
    </p>

    <a href="index.html" class="btn">Return Home</a>
  </div>

</body>
</html>
